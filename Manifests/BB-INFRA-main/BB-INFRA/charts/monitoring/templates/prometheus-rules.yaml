apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: bebouncy-qa-alerts
  namespace: monitoring
  labels:
    release: monitoring-qa 
spec:
  groups:
    - name: node.alerts
      interval: 60s
      rules:
        - alert: NodeHighCPU
          expr: 100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 85
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "High CPU on QA cluster"
            description: "CPU usage is above 85% for 3 minutes"

        - alert: NodeHighMemory
          expr: 100 * (1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)) > 85
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "High memory on QA cluster"
            description: "Memory usage is above 85% for 3 minutes"

        - alert: NodeDiskPressure
          expr: 100 * (1 - node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}) > 80
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Disk usage high"
            description: "Root disk usage is above 80%"

    - name: kubernetes.alerts
      interval: 60s
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Pod crash looping"
            description: 'Pod {{ `{{ $labels.namespace }}` }}/{{ `{{ $labels.pod }}` }} is restarting repeatedly'

        - alert: PodNotReady
          expr: sum by(namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Pod not running"
            description: 'Pod {{ `{{ $labels.namespace }}` }}/{{ `{{ $labels.pod }}` }} is stuck in {{ `{{ $labels.phase }}` }}'

        - alert: DeploymentReplicasMismatch
          expr: kube_deployment_status_replicas_available < kube_deployment_spec_replicas
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Deployment under desired replicas"
            description: 'Deployment {{ `{{ $labels.namespace }}` }}/{{ `{{ $labels.deployment }}` }} has fewer replicas than desired'
