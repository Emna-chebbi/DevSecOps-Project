# ALERTMANAGER
alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
    secrets:
      - smtp-password
  config:
    global:
      resolve_timeout: 5m
      smtp_smarthost: "ssl0.ovh.net:465"
      smtp_from: "emna@bebouncy.com"
      smtp_auth_username: "emna@bebouncy.com"
      smtp_auth_password_file: /etc/alertmanager/secrets/smtp-password/password
      smtp_require_tls: false
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 20s
      group_interval: 2m
      repeat_interval: 12h
      receiver: "email-alerts"
      routes:
        - receiver: "null"
          match:
            alertname: "Watchdog"
    receivers:
      - name: "null"
      - name: "email-alerts"
        email_configs:
          - to: "emna@bebouncy.com"
            send_resolved: true
            headers:
              Subject: '[{{ .Status | toUpper }}] QA — {{ .GroupLabels.alertname }}'
    inhibit_rules:
      - source_matchers: [severity="critical"]
        target_matchers: [severity="warning"]
        equal: ["alertname", "namespace"]

# PROMETHEUS 
prometheus:
  enabled: true
  prometheusSpec:
    replicas: 1
    retention: 3d
    retentionSize: "7GB"
    scrapeInterval: "45s"
    evaluationInterval: "45s"

    resources:
      requests:
        memory: "300Mi"
        cpu: "150m"
      limits:
        memory: "600Mi"
        cpu: "500m"

    podMonitorNamespaceSelector: {}
    serviceMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}
    podMonitorSelector: {}
    serviceMonitorSelector: {}
    ruleSelector: {}

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 8Gi

# GRAFANA
grafana:
  enabled: true
  adminPassword: "grafana-qa"

  resources:
    requests:
      memory: "100Mi"
      cpu: "50m"
    limits:
      memory: "200Mi"
      cpu: "200m"

  persistence:
    enabled: false

  ingress:
    enabled: false

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: "QA Cluster"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      # Node CPU / RAM / disk
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: Prometheus

      # Custom dashboard
      bebouncy-qa-cluster:
        json: |
          {
            "annotations": { "list": [] },
            "editable": true,
            "fiscalYearStartMonth": 0,
            "graphTooltip": 1,
            "links": [],
            "refresh": "60s",
            "schemaVersion": 38,
            "tags": ["kubernetes", "bebouncy", "qa", "k3s"],
            "templating": {
              "list": [
                {
                  "current": {},
                  "hide": 0,
                  "includeAll": false,
                  "multi": false,
                  "name": "datasource",
                  "options": [],
                  "query": "prometheus",
                  "refresh": 1,
                  "type": "datasource",
                  "label": "Data Source"
                }
              ]
            },
            "time": { "from": "now-3h", "to": "now" },
            "timepicker": {},
            "timezone": "browser",
            "title": "Be Bouncy — K3s QA Cluster",
            "uid": "bebouncy-k3s-qa-v1",
            "version": 1,
            "panels": [
              {
                "collapsed": false,
                "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
                "id": 100,
                "title": "Cluster Overview",
                "type": "row"
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "fieldConfig": {
                  "defaults": {
                    "color": { "mode": "thresholds" },
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [{ "color": "green", "value": null }]
                    },
                    "unit": "short",
                    "noValue": "0"
                  },
                  "overrides": []
                },
                "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
                "id": 101,
                "options": {
                  "colorMode": "background",
                  "graphMode": "none",
                  "justifyMode": "center",
                  "orientation": "auto",
                  "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
                  "textMode": "auto"
                },
                "title": "Nodes Ready",
                "type": "stat",
                "targets": [
                  {
                    "datasource": { "type": "prometheus", "uid": "${datasource}" },
                    "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
                    "instant": true,
                    "legendFormat": "Nodes"
