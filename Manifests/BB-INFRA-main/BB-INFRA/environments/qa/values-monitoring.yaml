                  "defaults": {
                    "color": { "mode": "thresholds" },
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [{ "color": "green", "value": null }]
                    },
                    "unit": "short",
                    "noValue": "0"
                  },
                  "overrides": []
                },
                "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
                "id": 102,
                "options": {
                  "colorMode": "background",
                  "graphMode": "none",
                  "justifyMode": "center",
                  "orientation": "auto",
                  "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
                  "textMode": "auto"
                },
                "title": "Pods Running",
                "type": "stat",
                "targets": [
                  {
                    "datasource": { "type": "prometheus", "uid": "${datasource}" },
                    "expr": "sum(kube_pod_status_phase{phase=\"Running\"})",
                    "instant": true,
                    "legendFormat": "Pods"
                  }
                ]
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "fieldConfig": {
                  "defaults": {
                    "color": { "mode": "thresholds" },
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "yellow", "value": 70 },
                        { "color": "red", "value": 90 }
                      ]
                    },
                    "unit": "percent",
                    "max": 100,
                    "min": 0,
                    "noValue": "0"
                  },
                  "overrides": []
                },
                "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
                "id": 103,
                "options": {
                  "colorMode": "background",
                  "graphMode": "area",
                  "justifyMode": "center",
                  "orientation": "auto",
                  "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
                  "textMode": "auto"
                },
                "title": "Cluster CPU %",
