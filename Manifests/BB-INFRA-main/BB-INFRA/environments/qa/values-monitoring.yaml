  grafana.ini:
    analytics:
      reporting_enabled: false
      check_for_updates: false
    log:
      level: warn
    server:
      root_url: "http://localhost:3003"

# PROMETHEUS OPERATOR
prometheusOperator:
  enabled: true
  resources:
    requests:
      memory: "64Mi"
      cpu: "30m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false
  tls:
    enabled: false

kubelet:
  enabled: true
  serviceMonitor:
    https: true
    insecureSkipVerify: true
    interval: "60s"
    cAdvisorRelabelings:
      - action: replace
        sourceLabels: [__metrics_path__]
        targetLabel: metrics_path

# KUBE-STATE-METRICS
kube-state-metrics:
  enabled: true
  resources:
    requests:
      memory: "50Mi"
      cpu: "20m"
    limits:
      memory: "100Mi"
      cpu: "100m"

# NODE EXPORTER
nodeExporter:
  enabled: true
  resources:
    requests:
      memory: "30Mi"
      cpu: "20m"
    limits:
      memory: "60Mi"
      cpu: "100m"

kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false

