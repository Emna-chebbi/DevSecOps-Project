# QA-specific values for Web
replicaCount: 1

image:
  repository: ghcr.io/be-bouncy-wwd/web
  tag: "48b8893"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 4000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: qa.bebouncy.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - qa.bebouncy.com
      secretName: web-qa-tls

resources:
  limits:
    cpu: 300m
    memory: 384Mi
  requests:
    cpu: 150m
    memory: 192Mi

autoscaling:
  enabled: false

livenessProbe:
  httpGet:
    path: /health
    port: 4000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 4000
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

config:
  env: qa
  apiUrl: "http://api-qa:3005"

envFrom:
  - secretRef:
      name: web-secrets

httpRoute:
  enabled: false